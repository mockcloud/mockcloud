name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  # Go unit tests + vet + default build (the stub UI path — no prebuilt dist).
  go-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache: false
      - run: go vet ./...
      - run: go build ./...
      - run: go test ./...

  # Conformance: the vitest suite (real @aws-sdk/* clients) driven purely over
  # HTTP against the spawned Go binary, one server process per test file. This
  # is now the ONLY functional test path — the same suite that gated the Node
  # reference before the M11 cutover (see docs/MIGRATION.md). Node is present
  # both to run vitest and as the Lambda sandbox runtime. Windows leg catches
  # path/spawn drift where the maintainer develops.
  conformance-go:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    name: conformance vs go (${{ matrix.os }})
    needs: go-check
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache: false
      - run: npm ci
      - run: node scripts/conformance.mjs --ci

  # Guard the release build path: build the console, then compile the fully
  # self-contained binary (-tags embedui). Nothing here is published — that is
  # the manual release pipeline (docs/MIGRATION.md §Release).
  embed-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache: false
      - run: npm --prefix ui ci
      - run: npm run ui:build
      - run: go build -tags embedui -o /tmp/mockcloud ./cmd/mockcloud
