name: CI

on:
  pull_request:
  push:
    branches: [main, wip-snapshot]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [18, 20]
    name: test (node ${{ matrix.node }})
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm test

  # Spawn-mode harness check: the same suite, driven purely over HTTP against
  # an externally spawned server (one process per test file). This is the
  # conformance path the Go port will be gated on — running it against the
  # Node reference on every PR keeps the harness itself honest. Windows leg
  # catches path/spawn drift where the maintainer develops.
  conformance-node:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    name: conformance vs node (${{ matrix.os }})
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: node scripts/conformance.mjs --all --strict --server "node src/index.js"
