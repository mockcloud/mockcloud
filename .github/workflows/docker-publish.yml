name: Publish Docker Image

on:
  # MANUAL ONLY — publishing is a deliberate step. The auto-trigger on v* tags
  # was removed at the M11 cutover (docs/MIGRATION.md): images go out only when
  # a maintainer runs this workflow, and only after the version input is set.
  workflow_dispatch:
    inputs:
      version:
        description: "Image tag (e.g. 2.0.0)"
        required: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}   # mockcloud/mockcloud

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Slim distroless image (Lambda unavailable — no node runtime).
      - name: Build and push slim
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ inputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      # Node-runtime variant (Lambda works). Suffix: <version>-node.
      - name: Build and push node variant
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.node
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ inputs.version }}-node
