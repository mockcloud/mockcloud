# goreleaser config for MockCloud (Go). STAGED — not wired to auto-run; the
# release is a manual step (docs/MIGRATION.md §Release). Cross-compiles the
# fully self-contained binary (UI embedded via -tags embedui) for the five
# target platforms and produces archives + checksums + a GitHub Release.
#
# The console must be built first:  npm --prefix ui ci && npm run ui:build
# then:  goreleaser release --clean   (or --snapshot to dry-run locally)
version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: mockcloud
    main: ./cmd/mockcloud
    binary: mockcloud
    env:
      - CGO_ENABLED=0
    flags:
      - -tags=embedui
    ldflags:
      - -s -w
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]

archives:
  - id: mockcloud
    name_template: "mockcloud_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: mockcloud
    name: mockcloud
  draft: true # publish is a deliberate manual click

# npm platform packages (@mockcloud/cli-<os>-<arch>) + the wrapper are published
# by scripts/publish-npm.mjs after goreleaser uploads the archives; see
# docs/MIGRATION.md §Release. Kept out of this file so `goreleaser` never
# touches npm on its own.
